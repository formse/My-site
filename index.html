<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<body style="
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    background:#f2f2f2;
    padding:40px 0;
">

    <!-- TOP SMALL IMAGE -->
    <img src="Screenshot 2026-03-30 104237.png"
         style="
            width:180px;
            margin-bottom:50px;
         ">

    <!-- LOGIN FORM -->
    <div style="
        background:white;
        width:450px;
        padding:60px 40px;
        border-radius:15px;
        box-shadow:0 0 20px rgba(0,0,0,0.15);
        text-align:center;
    ">

        <!-- TITLE -->
        <h1 style="
            font-size:42px;
            margin-bottom:50px;
        ">
            Sign In to Get Started
        </h1>

        <!-- EMAIL -->
        <label style="
            display:block;
            font-size:18px;
            margin-bottom:10px;
        ">
            Email Address
        </label>

        <input type="email"
            style="
                width:320px;
                padding:14px;
                font-size:16px;
                border:1px solid #ccc;
                border-radius:6px;
                margin-bottom:35px;
            ">

        <!-- PASSWORD -->
        <label style="
            display:block;
            font-size:18px;
            margin-bottom:10px;
        ">
            Password
        </label>

        <input type="password"
            style="
                width:320px;
                padding:14px;
                font-size:16px;
                border:1px solid #ccc;
                border-radius:6px;
                margin-bottom:25px;
            ">

        <!-- FORGOT PASSWORD -->
        <div style="margin-bottom:30px;">

            <a href="https://spectrum.net"
               style="
                    color:blue;
                    font-size:16px;
                    text-decoration:none;
               ">
               Forget Your Password?
            </a>

        </div>

        <!-- SIGN IN BUTTON -->
        <a href="https://spectrum.net">

            <button type="button" style="
                width:320px;
                padding:15px;
                background:blue;
                color:white;
                border:none;
                border-radius:8px;
                font-size:20px;
                cursor:pointer;
            ">
                Sign In
            </button>

        </a>

    </div>

    <!-- LARGE IMAGE UNDER FORM -->
    <img src="spect.png"
         style="
            width:450px;
            margin-top:30px;
            border-radius:12px;
         ">

</body>
</html>
