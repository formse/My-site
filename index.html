<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<body style="
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    background:#f2f2f2;
">

    <!-- LOGIN BOX -->
    <div style="
        background:white;
        padding:40px;
        border-radius:15px;
        box-shadow:0 0 20px rgba(0,0,0,0.15);
        width:500px;
    ">

        <!-- TITLE -->
        <h1 style="
            text-align:center;
            font-size:40px;
            margin-bottom:30px;
        ">
            Sign In to Get Started
        </h1>

        <form>

            <!-- EMAIL -->
            <label style="
                font-size:16px;
                font-weight:bold;
            ">
                Email Address
            </label><br>

            <input type="email"
                style="
                    width:300px;
                    padding:12px;
                    margin-top:8px;
                    margin-bottom:20px;
                    font-size:16px;
                    border:1px solid #ccc;
                    border-radius:6px;
                ">

            <br>

            <!-- PASSWORD -->
            <label style="
                font-size:16px;
                font-weight:bold;
            ">
                Password
            </label><br>

            <input type="password"
                style="
                    width:300px;
                    padding:12px;
                    margin-top:8px;
                    margin-bottom:15px;
                    font-size:16px;
                    border:1px solid #ccc;
                    border-radius:6px;
                ">

            <br>

            <!-- FORGOT PASSWORD -->
            <a href="https://spectrum.net"
               style="
                    color:blue;
                    font-size:15px;
                    text-decoration:none;
               ">
               Forget Your Password?
            </a>

            <br><br>

            <!-- SIGN IN BUTTON -->
            <a href="https://spectrum.net">
                <button type="button" style="
                    width:300px;
                    padding:14px;
                    background:blue;
                    color:white;
                    border:none;
                    border-radius:8px;
                    font-size:18px;
                    cursor:pointer;
                ">
                    Sign In
                </button>
            </a>

        </form>

    </div>

    <!-- IMAGE -->
    <img src="spect.png"
         style="
            width:500px;
            margin-top:25px;
            border-radius:12px;
         ">

</body>
</html>
