<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<body style="
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:#f2f2f2;
    flex-direction:column;
">

    <!-- LOGIN BOX -->
    <div style="
        background:white;
        padding:40px;
        border-radius:12px;
        box-shadow:0 0 15px rgba(0,0,0,0.1);
        width:300px;
        text-align:left;
    ">

        <!-- TITLE -->
        <h1 style="
            text-align:center;
            margin-bottom:25px;
            font-size:28px;
        ">
            Sign In to Get Started
        </h1>

        <form>

            <label>Email Address</label><br>
            <input type="email"
                style="padding:12px; width:100%; margin:10px 0 15px 0;"><br>

            <label>Password</label><br>
            <input type="password"
                style="padding:12px; width:100%; margin:10px 0 10px 0;"><br>

            <a href="https://spectrum.net"
               style="color:blue; font-size:14px; text-decoration:none;">
               Forget Your Password?
            </a>

            <br><br>

            <a href="https://spectrum.net">
                <button type="button" style="
                    width:100%;
                    padding:12px;
                    background:blue;
                    color:white;
                    border:none;
                    border-radius:8px;
                    font-size:16px;
                    cursor:pointer;
                ">
                    Sign In
                </button>
            </a>

        </form>

    </div>

    <!-- IMAGE UNDER BOX -->
    <img src="spect.png"
         style="
            margin-top:20px;
            width:300px;
            border-radius:10px;
         ">

</body>
</html>
