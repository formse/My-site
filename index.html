<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<body style="
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    background:#f2f2f2;
">

    <!-- LOGIN BOX -->
    <div style="
        background:white;
        padding:40px 30px;
        border-radius:15px;
        box-shadow:0 0 20px rgba(0,0,0,0.15);
        width:600px;
        text-align:center;
    ">

        <!-- TITLE -->
        <h1 style="
            font-size:42px;
            margin-bottom:30px;
        ">
            Sign In to Get Started
        </h1>

        <form>

            <div style="margin-bottom:20px;">

                <label style="
                    display:block;
                    margin-bottom:8px;
                    font-size:16px;
                    text-align:center;
                ">
                    Email Address
                </label>

                <input type="email"
                    style="
                        width:300px;
                        padding:12px;
                        font-size:16px;
                        text-align:center;
                        border:1px solid #ccc;
                        border-radius:6px;
                    ">

            </div>

            <div style="margin-bottom:20px;">

                <label style="
                    display:block;
                    margin-bottom:8px;
                    font-size:16px;
                    text-align:center;
                ">
                    Password
                </label>

                <input type="password"
                    style="
                        width:300px;
                        padding:12px;
                        font-size:16px;
                        text-align:center;
                        border:1px solid #ccc;
                        border-radius:6px;
                    ">

            </div>

            <a href="https://spectrum.net"
               style="
                    color:blue;
                    font-size:15px;
                    text-decoration:none;
               ">
               Forget Your Password?
            </a>

            <br><br>

            <a href="https://spectrum.net">
                <button type="button" style="
                    width:300px;
                    padding:14px;
                    background:blue;
                    color:white;
                    border:none;
                    border-radius:8px;
                    font-size:18px;
                    cursor:pointer;
                ">
                    Sign In
                </button>
            </a>

        </form>

    </div>

    <!-- LARGE IMAGE -->
    <img src="spect.png"
         style="
            width:600px;
            margin-top:25px;
            border-radius:12px;
         ">

</body>
</html>
