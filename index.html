<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<body style="
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:#f2f2f2;
    flex-direction:column;
">

    <!-- LOGIN BOX -->
    <div style="
        background:white;
        padding:50px;
        border-radius:15px;
        box-shadow:0 0 20px rgba(0,0,0,0.15);
        width:600px;
        text-align:center;
    ">

        <!-- TITLE -->
        <h1 style="
            font-size:36px;
            margin-bottom:30px;
        ">
            Sign In to Get Started
        </h1>

        <form>

            <div style="text-align:left;">

                <label>Email Address</label><br>
                <input type="email"
                    style="
                        padding:14px;
                        width:100%;
                        margin:10px 0 20px 0;
                        text-align:center;
                        font-size:16px;
                    ">

                <label>Password</label><br>
                <input type="password"
                    style="
                        padding:14px;
                        width:100%;
                        margin:10px 0 10px 0;
                        text-align:center;
                        font-size:16px;
                    ">

            </div>

            <br>

            <a href="https://spectrum.net"
               style="
                    color:blue;
                    font-size:15px;
                    text-decoration:none;
               ">
               Forget Your Password?
            </a>

            <br><br>

            <a href="https://spectrum.net">
                <button type="button" style="
                    width:100%;
                    padding:15px;
                    background:blue;
                    color:white;
                    border:none;
                    border-radius:10px;
                    font-size:18px;
                    cursor:pointer;
                ">
                    Sign In
                </button>
            </a>

        </form>

    </div>

    <!-- LARGE IMAGE UNDER BOX -->
    <img src="spect.png"
         style="
            margin-top:25px;
            width:600px;
            border-radius:12px;
         ">

</body>
</html>
