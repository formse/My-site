<!DOCTYPE html>
<html>
<head>
    <title>Sign In</title>
</head>

<body style="
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:#f2f2f2;
">

    <div style="
        text-align:left;
        background:white;
        padding:40px;
        border-radius:12px;
        box-shadow:0 0 15px rgba(0,0,0,0.1);
        width:300px;
    ">

        <h1 style="text-align:center; margin-bottom:20px;">Login</h1>

        <form>

            <label>Email Address</label><br>
            <input type="email" name="email"
            style="padding:12px; width:100%; margin:10px 0 15px 0;"><br>

            <label>Password</label><br>
            <input type="password" name="password"
            style="padding:12px; width:100%; margin:10px 0 15px 0;"><br>

            <p style="text-align:center; margin-top:10px;">Sign In</p>

        </form>

    </div>

</body>
</html>
